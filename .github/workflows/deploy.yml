name: Deploy via EasyPanel

on:
  workflow_run:
    workflows:
      - Build and Publish
    types:
      - completed
    branches:
      - master

jobs:
  deploy:
    name: Trigger EasyPanel webhook
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger deployment
        run: |
          curl --fail -X GET "${{ secrets.EASYPANEL_WEBHOOK_URL }}"
